<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Media Loader KMP</title>
    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./js"
        }
      }
    </script>

    <script type="module">
      import { Core } from "p2p-media-loader-core";

      class NativeBridge {
        constructor() {
          this.platform = this.detectPlatform();
        }

        detectPlatform() {
          if (
            window.webkit &&
            window.webkit.messageHandlers &&
            window.webkit.messageHandlers.p2pml
          ) {
            return "ios";
          } else if (window.P2PMLAndroid) {
            return "android";
          }
          return "unknown";
        }

        sendMessage(type, payload = {}) {
          const message = { type, payload };

          switch (this.platform) {
            case "ios":
              window.webkit.messageHandlers.p2pml.postMessage(message);
              break;
            case "android":
              window.P2PMLAndroid.postMessage(JSON.stringify(message));
              break;
            default:
              console.warn(`[Bridge] Platform unknown. Message lost: ${type}`);
          }
        }
      }

      class P2P {
        constructor(bridge) {
          this.bridge = bridge;
          this.eventHandlers = new Map();
          this.uploadUrl = "http://127.0.0.1:8080/segment-upload";
        }

        initP2P(coreConfigJson, uploadBaseUrl) {
          if (uploadBaseUrl) {
            this.uploadUrl = uploadBaseUrl;
          }

          this.coreConfig = coreConfigJson ? JSON.parse(coreConfigJson) : {};
          this.createP2PEngine();
        }

        createP2PEngine() {
          if (this.core) this.destroyP2PEngine();

          this.core = new Core(this.coreConfig);
        }

        destroyP2PEngine() {
          if (!this.core) return;

          this.core.destroy();
          this.core = null;
        }

        applyDynamicP2PCoreConfig(dynamicCoreConfigJson) {
          if (!this.core || !dynamicCoreConfigJson) return;
          this.core.applyDynamicConfig(JSON.parse(dynamicCoreConfigJson));
        }

        subscribeToEvent(eventName) {
          if (this.eventHandlers.has(eventName)) return;

          const handler = (...args) => {
            const payload = this.formatEventPayload(eventName, args);
            this.bridge.sendMessage(eventName, payload);
          };

          this.eventHandlers.set(eventName, handler);
          this.core.addEventListener(eventName, handler);
        }

        unsubscribeFromEvent(eventName) {
          const handler = this.eventHandlers.get(eventName);
          if (!handler || !this.core) return;

          this.core.removeEventListener(eventName, handler);
          this.eventHandlers.delete(eventName);
        }

        formatEventPayload(eventName, args) {
          switch (eventName) {
            case "onChunkDownloaded":
              return {
                bytesLength: args[0],
                downloadSource: args[1],
                peerId: args[2],
              };
            case "onChunkUploaded":
              return { bytesLength: args[0], peerId: args[1] };
            case "onTrackerError":
            case "onTrackerWarning":
              return {
                streamType: args[0].streamType,
                error: {
                  message: args[0].error.message,
                  stack: args[0].error.stack,
                },
              };
            default:
              return args[0];
          }
        }

        parseAllStreams(jsonData) {
          if (!this.core) return;

          const streams = JSON.parse(jsonData);
          for (const stream of streams) {
            this.core.addStreamIfNoneExists(stream);
          }
        }

        parseStream(jsonData) {
          if (!this.core) return;

          const playlist = JSON.parse(jsonData);
          const { streamRuntimeId, addSegments, removeSegmentsIds, isLive } =
            playlist;

          this.core.updateStream(
            streamRuntimeId,
            addSegments,
            removeSegmentsIds
          );
          this.core.setIsLive(isLive);
        }

        setManifestUrl(manifestUrl) {
          if (!this.core) return;
          this.core.setManifestResponseUrl(manifestUrl);
        }

        updatePlaybackInfo(playbackInfoJson) {
          if (!this.core) return;

          const { currentPlayPosition, currentPlaybackSpeed } =
            JSON.parse(playbackInfoJson);
          this.core.updatePlayback(currentPlayPosition, currentPlaybackSpeed);
        }

        async processSegmentRequest(segmentUrl) {
          const uploadToKtor = (status, body = null, errorType = null) => {
            let url = `${this.uploadUrl}?segmentId=${encodeURIComponent(
              segmentUrl
            )}`;
            if (errorType) url += `&error=${errorType}`;

            const options = { method: "POST" };
            if (body) {
              options.headers = { "Content-Type": "application/octet-stream" };
              options.body = body;
            }

            fetch(url, options).catch((e) =>
              console.error("Ktor Upload Failed", e)
            );
          };

          try {
            await this.core.loadSegment(segmentUrl, {
              onSuccess: (response) => uploadToKtor("success", response.data),
              onError: (error) => uploadToKtor("error", null, error.type),
            });
          } catch (e) {
            uploadToKtor("error", null, "not_found");
          }
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const bridge = new NativeBridge();
        const p2p = new P2P(bridge);

        window.p2p = p2p;
        console.log("document loaded");
        bridge.sendMessage("onWebViewLoaded");
      });
    </script>
  </head>
  <body></body>
</html>
