<!DOCTYPE html>
<html lang="">
<head>
    <title>WebView Example</title>
    <script type="importmap">
        {
          "imports": {
            "p2p-media-loader-core": "./js"
          }
        }
    </script>

    <script type="module">
        import { Core } from "p2p-media-loader-core";

        class P2P {
          constructor() {
            this.eventHandlers = new Map();
          }

          subscribeToEvent(eventName) {
            if (this.eventHandlers.has(eventName)) {
                return;
            }

            const handler = (...args) => {
                sendToIos(eventName, this.formatEventPayload(eventName, args));
            };

            this.eventHandlers.set(eventName, handler);

            this.core.addEventListener(eventName, handler);
          }

          unsubscribeFromEvent(eventName) {
            const handler = this.eventHandlers.get(eventName);
            if (!handler) return;

            this.core.removeEventListener(eventName, handler);
            this.eventHandlers.delete(eventName);
          }

          formatEventPayload(eventName, args) {
            switch (eventName) {
              case "onChunkDownloaded":
                return { bytesLength: args[0], downloadSource: args[1], peerId: args[2] };
              case "onChunkUploaded":
                return { bytesLength: args[0], peerId: args[1] };
              case "onTrackerError":
              case "onTrackerWarning":
                return {
                    streamType: args[0].streamType,
                    error: { message: args[0].error.message, stack: args[0].error.stack }
                };
              default:
                return args[0];
            }
          }

          initP2P(coreConfigJson) {
            if (!coreConfigJson) {
              this.createP2PEngine();
              return;
            }

            this.coreConfig = JSON.parse(coreConfigJson);
            this.createP2PEngine();
          }

          applyDynamicP2PCoreConfig(dynamicCoreConfigJson) {
            if (!dynamicCoreConfigJson) return;

            const dynamicConfig = JSON.parse(dynamicCoreConfigJson);
            this.core.applyDynamicConfig(dynamicConfig);
          }

          destroyP2PEngine() {
            this.core.destroy();
            this.core = null;
          }

          createP2PEngine() {
            if (this.core) {
              this.destroyP2PEngine();
            }
            this.core = new Core(this.coreConfig ?? {});
          }

          parseAllStreams(jsonData) {
            const streams = JSON.parse(jsonData);

            for (const stream of streams) {
              this.core.addStreamIfNoneExists(stream);
            }
          }

          parseStream(jsonData) {
            const playlist = JSON.parse(jsonData);
            const { streamRuntimeId, addSegments, removeSegmentsIds, isLive } =
              playlist;

            this.core.updateStream(
              streamRuntimeId,
              addSegments,
              removeSegmentsIds
            );
            this.core.setIsLive(isLive);
          }

          async processSegmentRequest(segmentUrl) {
            const onSuccess = (response) => {
              try {
                fetch(
                  `http://127.0.0.1:8080/segment-upload?segmentId=${segmentUrl}`,
                  {
                    method: "POST",
                    headers: { "Content-Type": "application/octet-stream" },
                    body: response.data,
                  }
                );
                // const copyData = new ArrayBuffer(response.data.byteLength);
                // new Uint8Array(copyData).set(new Uint8Array(response.data));
                // this.port.postMessage(`${requestId}`);
                // this.port.postMessage(copyData, [copyData]);
              } catch (e) {
                console.error(e);
                //this.port.postMessage(`Error:${requestId}:failed|${segmentUrl}`);
              }
            };

            const onError = (error) => {
              fetch(
                `http://127.0.0.1:8080/segment-upload?segmentId=${segmentUrl}&error=${error.type}`,
                {
                  method: "POST",
                }
              );
            };

            try {
              await this.core.loadSegment(segmentUrl, {
                onSuccess,
                onError,
              });
            } catch (e) {
              fetch(
                `http://127.0.0.1:8080/segment-upload?segmentId=${segmentUrl}&error=not_found`,
                {
                  method: "POST",
                }
              );
            }
          }

          setManifestUrl(manifestUrl) {
            this.core.setManifestResponseUrl(manifestUrl);
          }

          updatePlaybackInfo(playbackInfoJson) {
            const playbackInfo = JSON.parse(playbackInfoJson);
            const { currentPlayPosition, currentPlaybackSpeed } = playbackInfo;
            this.core.updatePlayback(currentPlayPosition, currentPlaybackSpeed);
          }
        }

        const sendToIos = (type, payload) => {
          if (window.webkit?.messageHandlers?.p2pml) {
            window.webkit.messageHandlers.p2pml.postMessage({
              type,
              payload,
            });
          }
        };

        document.addEventListener("DOMContentLoaded", () => {
          const p2p = new P2P();
          window.p2p = p2p;

          if (window.webkit) {
            sendToIos("onWebViewLoaded");
          } else Android.onWebViewLoaded();
        });
    </script>
</head>

<body></body>
</html>
