<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Media Loader KMP</title>
    <script>
      (function () {
        var MAX_ENTRY_LENGTH = 4096;
        var MAX_BUFFERED_ENTRIES = 200;
        var FLUSH_INTERVAL_MS = 200;

        var debugSpec = new URLSearchParams(location.search).get("debug");

        function applyDebugSpec() {
          try {
            if (debugSpec) localStorage.setItem("debug", debugSpec);
            else localStorage.removeItem("debug");
          } catch (e) {
            if (debugSpec) {
              enqueue(
                "warn",
                "[log bridge] localStorage unavailable; engine debug logs stay off",
              );
            }
          }
        }

        var pendingEntries = [];
        var droppedCount = 0;
        var flushTimer = null;

        function sendToNative(message) {
          if (window.P2PMLAndroid) {
            window.P2PMLAndroid.postMessage(message);
          } else if (window.webkit?.messageHandlers?.p2pml) {
            window.webkit.messageHandlers.p2pml.postMessage(message);
          }
        }

        function flush() {
          flushTimer = null;
          if (droppedCount > 0) {
            pendingEntries.push({
              level: "warn",
              text: "[log bridge] dropped " + droppedCount + " entries",
            });
            droppedCount = 0;
          }

          var message = JSON.stringify({
            type: "onEngineLog",
            payload: { entries: pendingEntries.splice(0) },
          });

          try {
            sendToNative(message);
          } catch (e) {
            // Never log from in here, console is hooked below.
          }
        }

        function enqueue(level, text) {
          if (pendingEntries.length >= MAX_BUFFERED_ENTRIES) {
            droppedCount++;
          } else {
            pendingEntries.push({
              level: level,
              text: text.slice(0, MAX_ENTRY_LENGTH),
            });
          }

          if (flushTimer === null) {
            flushTimer = setTimeout(flush, FLUSH_INTERVAL_MS);
          }
        }

        function stringify(value) {
          if (typeof value === "string") return value;
          if (value instanceof Error) {
            return value.stack || value.name + ": " + value.message;
          }

          try {
            return JSON.stringify(value);
          } catch (e) {
            return String(value);
          }
        }

        function applyFormatDirectives(template, args) {
          var nextArg = 0;

          var text = template.replace(/%([%cdifsoOj])/g, function (match, directive) {
            if (directive === "%") return "%";
            if (nextArg >= args.length) return match;
            var arg = args[nextArg++];
            return directive === "c" ? "" : stringify(arg);
          });

          return { text: text, unusedArgs: args.slice(nextArg) };
        }

        function formatConsoleArgs(rawArgs) {
          var args = Array.prototype.slice.call(rawArgs);
          var formatted = "";

          if (typeof args[0] === "string" && args[0].indexOf("%") !== -1) {
            var result = applyFormatDirectives(args[0], args.slice(1));
            formatted = result.text;
            args = result.unusedArgs;
          }

          return [formatted].concat(args.map(stringify)).filter(Boolean).join(" ");
        }

        function hookConsoleMethod(name) {
          var original = console[name];
          console[name] = function () {
            enqueue(name, formatConsoleArgs(arguments));
            if (original) original.apply(console, arguments);
          };
        }

        function forwardUncaughtErrors() {
          window.addEventListener("error", function (event) {
            enqueue(
              "error",
              event.message + " (" + event.filename + ":" + event.lineno + ")",
            );
          });
          window.addEventListener("unhandledrejection", function (event) {
            enqueue(
              "error",
              "Unhandled promise rejection: " + stringify(event.reason),
            );
          });
        }

        applyDebugSpec();

        hookConsoleMethod("warn");
        hookConsoleMethod("error");
        forwardUncaughtErrors();

        if (debugSpec) {
          hookConsoleMethod("debug");
          hookConsoleMethod("log");
          hookConsoleMethod("info");
        }
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "p2p-media-loader-core": "./p2p-media-loader-core.es.min.js"
        }
      }
    </script>

    <script type="module">
      import { Core, generateStreamShortId } from "p2p-media-loader-core";

      class NativeBridge {
        constructor() {
          this.platform = this.detectPlatform();
        }

        detectPlatform() {
          if (window.P2PMLAndroid) return "android";
          if (window.webkit?.messageHandlers?.p2pml) return "ios";
          return "unknown";
        }

        sendChunkDownloaded(bytesLength, downloadSource, peerId) {
          if (this.platform === "android") {
            window.P2PMLAndroid.onChunkDownloaded(
              bytesLength,
              downloadSource,
              peerId,
            );
          } else if (this.platform === "ios") {
            window.webkit.messageHandlers.p2pml_onChunkDownloaded.postMessage({
              bytesLength,
              downloadSource,
              peerId,
            });
          }
        }

        sendChunkUploaded(bytesLength, peerId) {
          if (this.platform === "android") {
            window.P2PMLAndroid.onChunkUploaded(bytesLength, peerId);
          } else if (this.platform === "ios") {
            window.webkit.messageHandlers.p2pml_onChunkUploaded.postMessage({
              bytesLength,
              peerId,
            });
          }
        }

        sendMessage(type, payload = {}) {
          const message = JSON.stringify({ type, payload });
          if (this.platform === "android") {
            window.P2PMLAndroid.postMessage(message);
          } else if (this.platform === "ios") {
            window.webkit.messageHandlers.p2pml.postMessage(message);
          } else {
            console.warn(`[Bridge] Platform unknown. Message lost: ${type}`);
          }
        }
      }

      class P2P {
        constructor(bridge) {
          this.bridge = bridge;
          this.eventHandlers = new Map();
        }

        initP2P(coreConfigJsObject, uploadBaseUrl) {
          try {
            this.uploadUrl = uploadBaseUrl;
            this.coreConfig = coreConfigJsObject || {};
            this.createP2PEngine();
            this.bridge.sendMessage("onCoreInitialized");
          } catch (e) {
            this.bridge.sendMessage("onCoreInitFailed", {
              message: e instanceof Error ? e.message : String(e),
              stack: e instanceof Error ? e.stack : undefined,
            });
          }
        }

        createP2PEngine() {
          if (this.core) this.destroyP2PEngine();

          this.core = new Core(this.coreConfig);
        }

        destroyP2PEngine() {
          if (!this.core) return;

          this.core.destroy();
          this.core = null;
        }

        applyDynamicP2PCoreConfig(dynamicCoreConfigJsObject) {
          if (!this.core || !dynamicCoreConfigJsObject) return;

          this.core.applyDynamicConfig(dynamicCoreConfigJsObject);
        }

        subscribeToEvent(eventName) {
          if (this.eventHandlers.has(eventName)) return;

          const handler = (...args) => {
            if (eventName === "onChunkDownloaded") {
              this.bridge.sendChunkDownloaded(args[0], args[1], args[2]);
              return;
            }

            if (eventName === "onChunkUploaded") {
              this.bridge.sendChunkUploaded(args[0], args[1]);
              return;
            }

            const payload = this.formatEventPayload(eventName, args);
            this.bridge.sendMessage(eventName, payload);
          };

          this.eventHandlers.set(eventName, handler);
          this.core.addEventListener(eventName, handler);
        }

        unsubscribeFromEvent(eventName) {
          const handler = this.eventHandlers.get(eventName);
          if (!handler || !this.core) return;

          this.core.removeEventListener(eventName, handler);
          this.eventHandlers.delete(eventName);
        }

        // Engine errors are Error subclasses: message/stack are not own-enumerable, and the
        // error kind lives in `type` (segment requests) or `code` (peers). Raw JSON.stringify
        // would serialize them as {} or {type} only, so normalize to a stable shape here.
        serializeJsError(error) {
          if (error == null) return { message: "" };
          if (typeof error !== "object") return { message: String(error) };
          return {
            message: error.message != null ? String(error.message) : "",
            stack: typeof error.stack === "string" ? error.stack : undefined,
            type:
              typeof error.type === "string"
                ? error.type
                : typeof error.code === "string"
                  ? error.code
                  : undefined,
          };
        }

        formatEventPayload(eventName, args) {
          switch (eventName) {
            case "onTrackerError":
              return {
                streamType: args[0].streamType,
                error: this.serializeJsError(args[0].error),
              };
            case "onTrackerWarning":
              return {
                streamType: args[0].streamType,
                warning: this.serializeJsError(args[0].warning),
              };
            case "onSegmentError":
            case "onPeerError":
              return { ...args[0], error: this.serializeJsError(args[0].error) };
            default:
              return args[0];
          }
        }

        parseAllStreams(streams) {
          if (!this.core) return;

          for (const stream of streams) {
            const { runtimeId, type, ...streamProps } = stream;
            const index = generateStreamShortId({
              ...streamProps,
              bitrate: streamProps.bitrate || 0,
            });

            this.core.addStreamIfNoneExists({ runtimeId, type, index });
          }
        }

        parseStream(playlist) {
          if (!this.core) return;

          const { streamRuntimeId, addSegments, removeSegmentsIds, isLive } =
            playlist;

          this.core.updateStream(
            streamRuntimeId,
            addSegments,
            removeSegmentsIds,
          );
          this.core.setIsLive(isLive);
        }

        setManifestUrl(manifestUrl) {
          if (!this.core) return;
          this.core.setManifestResponseUrl(manifestUrl);
        }

        updatePlaybackInfo(playbackInfo) {
          if (!this.core) return;

          const { currentPlayPosition, currentPlaybackSpeed } = playbackInfo;
          this.core.updatePlayback(currentPlayPosition, currentPlaybackSpeed);
        }

        async processSegmentRequest(segmentUrl) {
          const uploadToKtor = (status, body = null, errorType = null) => {
            let url = `${this.uploadUrl}?segmentId=${encodeURIComponent(
              segmentUrl,
            )}`;
            if (errorType) url += `&error=${errorType}`;

            const options = { method: "POST" };
            if (body) {
              options.headers = {
                "Content-Type": "application/octet-stream",
              };
              options.body = body;
            }

            fetch(url, options).catch((e) =>
              console.error("Ktor Upload Failed", e),
            );
          };

          try {
            await this.core.loadSegment(segmentUrl, {
              onSuccess: (response) => uploadToKtor("success", response.data),
              onError: (error) => {
                console.error(
                  `Segment with URL ${segmentUrl} failed to load`,
                  error,
                );
                uploadToKtor("error", null, error.type);
              },
            });
          } catch (e) {
            uploadToKtor("error", null, "not_found");
          }
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const bridge = new NativeBridge();
        const p2p = new P2P(bridge);

        window.p2p = p2p;
        console.log("document loaded");
        bridge.sendMessage("onWebViewLoaded");
      });
    </script>
  </head>
  <body></body>
</html>
