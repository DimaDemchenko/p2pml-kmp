name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Spotless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Detekt and Spotless
        run: ./gradlew spotlessCheck detekt

