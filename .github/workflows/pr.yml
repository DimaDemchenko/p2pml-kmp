name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Lint
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt and Spotless
        run: ./gradlew spotlessCheck detekt --no-daemon

      - name: Build Android Demo
        run: ./gradlew :androidDemo:assembleDebug --no-daemon

      - name: Build iOS Demo
        run: |
          cd iosDemo
          xcodebuild -project iosDemo.xcodeproj -scheme iosDemo -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' build
