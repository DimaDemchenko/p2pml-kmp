name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint & Spotless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run Detekt and Spotless
        run: ./gradlew spotlessCheck detekt

  lint-ios:
    name: SwiftFormat & SwiftLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run SwiftFormat (check)
        run: >
          docker run --rm -v "$PWD/iosDemo:/work"
          ghcr.io/nicklockwood/swiftformat:0.62.1
          --lint /work --reporter github-actions-log
      - name: Run SwiftLint
        if: success() || failure()
        run: >
          docker run --rm -v "$PWD/iosDemo:/work" -w /work
          ghcr.io/realm/swiftlint:0.65.0
          swiftlint --strict --reporter github-actions-logging

  build-android:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Android Demo
        run: ./gradlew :androidDemo:assembleDebug
      - name: Run tests
        run: ./gradlew :p2pml:allTests

  build-ios:
    name: Build iOS Demo
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build iOS Demo
        run: |
          cd iosDemo
          xcodebuild -project iosDemo.xcodeproj -scheme iosDemo -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' ONLY_ACTIVE_ARCH=YES ARCHS=arm64 build
